services:
  - type: web
    name: woobuglog-chat
    env: node
    plan: free  # Change to 'starter' or other plans as needed
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DISCORD_BOT_TOKEN
        sync: false  # Set this in Render dashboard (secret)
      - key: DISCORD_GUILD_ID
        sync: false  # Set this in Render dashboard
      - key: DISCORD_DEFAULT_CHANNEL_ID
        sync: false  # Set this in Render dashboard
      - key: API_AUTH_ENABLED
        value: true
      - key: API_TOKEN
        sync: false  # Set this in Render dashboard (secret)
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: "*"
      - key: REQUEST_TIMEOUT
        value: 30000
      - key: MAX_MESSAGE_LENGTH
        value: 2000
      - key: DEFAULT_MESSAGE_LIMIT
        value: 50
